<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>Mon projet Tailwind</title>
</head>
<body>
    <section class="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-600">
        <form id="nform" class="w-full max-w-md">
            <div class="conteneur">
                <h1 class="text-3xl font-bold text-center text-indigo-700">
                    FORMULAIRE
                </h1>
                <label>
                    Nom
                    <input type="text" placeholder="Entrer votre nom" required>
                </label>
                <label>
                    Prénom
                    <input type="text" placeholder="Entrer votre prénom" required>
                </label>
                <label>
                    Email
                    <input type="email" id="email" placeholder="Entrer votre email" required>
                </label>
                <input type="submit" value="Envoyer">
            </div>
        </form>
        <p id="message" class="mt-4 text-center font-semibold"></p>
    </section>
    <script src="JS.js"></script>
</body>
</html>
