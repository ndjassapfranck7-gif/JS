<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>To-do List</title>
</head>

<body class="bg-gray-400 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-md">

    <section id="todo-app"
        class="bg-gray-200 p-8 rounded-xl shadow-lg">

        <h2 class="text-2xl font-bold text-blue-600 text-center mb-5">
            To-do List
        </h2>

        <div class="flex flex-col gap-3">

            <input
                id="todoInput"
                type="text"
                placeholder="Ajouter une tâche"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">

            <button
                id="addTodoBtn"
                class="bg-purple-600 text-white px-5 py-2 rounded-lg hover:bg-purple-700">
                Ajouter
            </button>

        </div>

        <button
            id="clearAllBtn"
            class="block mx-auto mt-8 bg-orange-500 text-white px-6 py-2 rounded-lg hover:bg-orange-600">
            Tout effacer
        </button>

        <ul
            id="todoList"
            class="mt-5 space-y-3 max-h-96 overflow-y-auto">
        </ul>

    </section>

</div>

<script src="JS.js"></script>

</body>
</html>
