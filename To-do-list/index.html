<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>Document</title>
</head>

<body class="bg-gray-400 min-h-screen flex flex-col items-center justify-center p-6">

<div class="w-full max-w-6xl">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-fit mx-auto">
        <!-- TO DO LIST -->
        <section id="todo-app"
        class="bg-gray-200 p-8 rounded-xl shadow-lg w-80">
            <h2 class="text-2xl font-bold text-blue-600 text-center mb-5">
                To-do List
            </h2>
            <div class="flex flex-col gap-3">
                <input 
                id="todoInput"
                type="text"
                placeholder="Ajouter une tâche"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                <button
                id="addTodoBtn"
                class="bg-purple-600 text-white px-5 py-2 rounded-lg hover:bg-purple-700">
                    Ajouter
                </button>
            </div>
            <button
            id="clearAllBtn"
            class="block mx-auto mt-8 bg-orange-500 text-white px-6 py-2 rounded-lg hover:bg-orange-600">
                Tout effacer
            </button>
            <ul id="todoList"
            class="mt-5 space-y-3 max-h-96 overflow-y-auto">
            </ul>
        </section>
        
        <!-- MODE SOMBRE -->
        <section id="theme-app"
        class="bg-gray-200 p-8 rounded-xl shadow-lg w-80 flex flex-col items-center justify-center">
            <h2 class="text-2xl font-bold text-purple-600 mb-5">
                Mode sombre
            </h2>
            <button
            id="themeToggle"
            class="bg-gray-800 text-white px-8 py-3 rounded-lg hover:bg-black">
                Activer le mode sombre
            </button>
        </section>
        
        <!-- QUIZ -->
        <section id="quiz-app"
        class="bg-gray-200 p-8 rounded-xl shadow-lg w-80">
            <h2 class="text-2xl font-bold text-green-600 text-center mb-5">
                Quiz
            </h2>
            <p id="questionText"
            class="text-lg text-gray-700 font-semibold text-center mb-5">
            </p>
            <div id="answers"
            class="text-gray-700 space-y-3 max-h-64 overflow-y-auto">
            </div>
            <button
            id="submitAnswerBtn"
            class="block mx-auto mt-6 bg-green-600 text-white px-8 py-2 rounded-lg hover:bg-green-700">
                Valider
            </button>
            <p id="quizResult"
            class="text-center mt-5 font-bold">
            </p>
        </section>
    </div>
</div>
<script src="JS.js"></script>
</body>
</html>
